<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💰 Money Date — Arthur & Lorena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F7F4EE;
      --bg-card: #FFFFFF;
      --bg-muted: #EFECE5;
      --green: #0A5C48;
      --green-mid: #127A60;
      --green-light: #E6F4EF;
      --amber: #B87217;
      --amber-mid: #CB8421;
      --amber-light: #FEF4E0;
      --coral: #A63535;
      --coral-light: #FDEDED;
      --purple: #52368A;
      --purple-light: #F0ECF9;
      --text: #1C1917;
      --text-muted: #6B6560;
      --text-light: #A09890;
      --border: #E2DDD5;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
      --shadow: 0 4px 16px rgba(0,0,0,0.09);
      --shadow-lg: 0 16px 48px rgba(0,0,0,0.13);
      --r: 14px;
      --r-sm: 8px;
    }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
    #root { min-height: 100vh; }
    h1,h2,h3,.serif { font-family: 'Playfair Display', serif; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity:0; }
      to   { opacity:1; }
    }
    @keyframes popIn {
      0%   { transform:scale(0.92); opacity:0; }
      100% { transform:scale(1);    opacity:1; }
    }
    .au  { animation: fadeUp  0.45s ease both; }
    .au1 { animation: fadeUp  0.45s .06s ease both; }
    .au2 { animation: fadeUp  0.45s .12s ease both; }
    .au3 { animation: fadeUp  0.45s .18s ease both; }
    .au4 { animation: fadeUp  0.45s .24s ease both; }
    .ai  { animation: fadeIn  0.32s ease both; }
    .pi  { animation: popIn   0.3s  ease both; }

    input[type=text],input[type=number],input[type=date],textarea {
      width:100%; background:var(--bg); border:1.5px solid var(--border);
      border-radius:var(--r-sm); padding:11px 14px;
      font-family:'DM Sans',sans-serif; font-size:15px; color:var(--text);
      transition:border-color .2s, box-shadow .2s; outline:none;
    }
    input:focus,textarea:focus {
      border-color:var(--green-mid);
      box-shadow:0 0 0 3px rgba(10,92,72,0.1);
      background:#fff;
    }
    textarea { resize:vertical; min-height:72px; line-height:1.55; }
    button { font-family:'DM Sans',sans-serif; cursor:pointer; transition:all .2s; }

    .cw::before { content:'$'; position:absolute; left:13px; top:50%;
      transform:translateY(-50%); color:var(--text-muted); font-size:14px;
      font-weight:500; pointer-events:none; }
    .cw { position:relative; }
    .cw input { padding-left:26px !important; }

    .btn-p {
      background:var(--green); color:#fff; border:none;
      border-radius:var(--r-sm); padding:13px 28px; font-size:15px; font-weight:600;
      display:inline-flex; align-items:center; gap:8px;
    }
    .btn-p:hover { background:var(--green-mid); transform:translateY(-1px); box-shadow:var(--shadow); }
    .btn-p:disabled { opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; }
    .btn-s {
      background:transparent; color:var(--text-muted); border:1.5px solid var(--border);
      border-radius:var(--r-sm); padding:12px 22px; font-size:14px; font-weight:500;
    }
    .btn-s:hover { border-color:var(--text-muted); color:var(--text); }
    .btn-amber {
      background:var(--amber); color:#fff; border:none;
      border-radius:var(--r-sm); padding:13px 28px; font-size:15px; font-weight:600;
    }
    .btn-amber:hover { filter:brightness(1.07); }

    label { display:block; font-size:12px; font-weight:600; color:var(--text-muted);
      margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em; }
    .fg { margin-bottom:18px; }

    .card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); padding:24px; box-shadow:var(--shadow-sm); }

    .pcard { border-radius:var(--r); padding:20px 22px; }
    .pcard-g { background:var(--green-light); border:1px solid rgba(10,92,72,0.11); }
    .pcard-a { background:var(--amber-light); border:1px solid rgba(184,114,23,0.14); }
    .pcard-c { background:var(--coral-light); border:1px solid rgba(166,53,53,0.13); }
    .pcard-p { background:var(--purple-light); border:1px solid rgba(82,54,138,0.14); }

    .plabel { font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; margin-bottom:10px; }
    .pi-item { display:flex; gap:10px; margin-bottom:10px; font-size:13.5px; line-height:1.55; }
    .pi-item:last-child { margin-bottom:0; }

    .mood-btn { background:none; border:2px solid transparent; border-radius:50%;
      width:48px; height:48px; font-size:24px; display:flex; align-items:center;
      justify-content:center; cursor:pointer; transition:all .15s; }
    .mood-btn:hover { transform:scale(1.12); background:rgba(0,0,0,.04); }
    .mood-btn.sel { border-color:var(--green-mid); background:var(--green-light); transform:scale(1.18); }

    .mcard { border:2px solid var(--border); border-radius:var(--r); padding:20px 18px;
      cursor:pointer; transition:all .2s; background:var(--bg-card); width:100%; text-align:left; }
    .mcard:hover { border-color:var(--green-mid); box-shadow:var(--shadow); transform:translateY(-2px); }
    .mcard.sel { border-color:var(--green); background:var(--green-light); }
    .mcard.sel-a { border-color:var(--amber); background:var(--amber-light); }

    .pbar-t { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
    .pbar-f { height:100%; background:var(--green); border-radius:2px; transition:width .55s cubic-bezier(.4,0,.2,1); }

    .dot-track { display:flex; gap:5px; justify-content:center; }
    .dot { height:6px; border-radius:3px; transition:all .35s cubic-bezier(.4,0,.2,1); }

    .hdr-g  { background:linear-gradient(135deg,#0A5C48 0%,#147B62 100%); }
    .hdr-a  { background:linear-gradient(135deg,#9E6112 0%,#CB8421 100%); }
    .hdr-c  { background:linear-gradient(135deg,#8A2C2C 0%,#B74040 100%); }
    .hdr-p  { background:linear-gradient(135deg,#3E2670 0%,#5B3D8F 100%); }

    .rcpt { background:#fff; border-radius:var(--r); border:1px solid var(--border); overflow:hidden; }
    .rcpt-row { display:flex; justify-content:space-between; align-items:center;
      padding:11px 18px; border-bottom:1px solid var(--border); }
    .rcpt-row:last-child { border-bottom:none; }
    .rcpt-row .k { font-size:13px; color:var(--text-muted); font-weight:500; }
    .rcpt-row .v { font-size:14px; font-weight:600; text-align:right; max-width:60%; }
    .rcpt-tot { background:var(--green-light); }
    .rcpt-tot .k { font-weight:700; color:var(--green); }
    .rcpt-tot .v { font-size:16px; color:var(--green); }

.nw-card { background:linear-gradient(135deg,var(--green) 0%,var(--green-mid) 100%);
      color:#fff; border-radius:var(--r); padding:16px 20px;
      display:flex; justify-content:space-between; align-items:center; }

    .g2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .step-cols { display:grid; grid-template-columns:1fr 1fr; gap:28px; }
    @media(max-width:700px) { .step-cols,.g2 { grid-template-columns:1fr; } }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-thumb { background:#CCC7C0; border-radius:3px; }

    .quote-card { background:var(--bg-muted); border-left:3px solid var(--purple);
      padding:14px 16px; border-radius:0 var(--r-sm) var(--r-sm) 0; margin-top:14px; }

    .tip-box { padding:14px 16px; border-radius:var(--r-sm); margin-top:14px; }
    .tip-g { background:var(--green-light); border:1px solid rgba(10,92,72,.12); }
    .tip-a { background:var(--amber-light); border:1px solid rgba(184,114,23,.14); }
    .tip-p { background:var(--purple-light); border:1px solid rgba(82,54,138,.14); }
    .tip-c { background:var(--coral-light); border:1px solid rgba(166,53,53,.13); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Config ──────────────────────────────────────────────────────────────────
const STEPS = {
  monthly:   ['warmup','budget','savings','debt','upcoming','actions','summary'],
  quarterly: ['warmup','budget','savings','debt','upcoming','retirement','actions','summary'],
  annual:    ['warmup','goals-review','goals5','goals10','goals20','theme','budget','savings','debt','upcoming','retirement','actions','summary'],
};
const META = {
  warmup:        { title:'Warm-Up',               emoji:'🎉', hdr:'hdr-a', pr:'pcard-a', clr:'var(--amber)',   time:'~5 min'  },
  budget:        { title:'Budget & Spending',      emoji:'📊', hdr:'hdr-g', pr:'pcard-g', clr:'var(--green)',   time:'~15 min' },
  savings:       { title:'Savings & Investments',  emoji:'💰', hdr:'hdr-g', pr:'pcard-g', clr:'var(--green)',   time:'~10 min' },
  debt:          { title:'Debt Tracker',           emoji:'💳', hdr:'hdr-c', pr:'pcard-c', clr:'var(--coral)',   time:'~10 min' },
  upcoming:      { title:'Upcoming Expenses',      emoji:'🗓️', hdr:'hdr-a', pr:'pcard-a', clr:'var(--amber)',   time:'~10 min' },
  retirement:    { title:'Retirement Corner',      emoji:'💼', hdr:'hdr-p', pr:'pcard-p', clr:'var(--purple)',  time:'~20 min' },
  'goals-review':{ title:'Goals Review',           emoji:'🔍', hdr:'hdr-p', pr:'pcard-p', clr:'var(--purple)',  time:'~15 min' },
  goals5:        { title:'5-Year Goals  (by 2031)',emoji:'🌱', hdr:'hdr-p', pr:'pcard-p', clr:'var(--purple)',  time:'~15 min' },
  goals10:       { title:'10-Year Goals (by 2036)',emoji:'🚀', hdr:'hdr-p', pr:'pcard-p', clr:'var(--purple)',  time:'~10 min' },
  goals20:       { title:'20-Year Goals (by 2046)',emoji:'🌈', hdr:'hdr-p', pr:'pcard-p', clr:'var(--purple)',  time:'~10 min' },
  theme:         { title:'Our 2026 Theme',         emoji:'🎯', hdr:'hdr-a', pr:'pcard-a', clr:'var(--amber)',   time:'~10 min' },
  actions:       { title:'Action Items',           emoji:'✅', hdr:'hdr-g', pr:'pcard-g', clr:'var(--green)',   time:'~10 min' },
  summary:       { title:'Summary & Export',       emoji:'📋', hdr:'hdr-g', pr:'pcard-g', clr:'var(--green)',   time:''        },
};
const MOODS = ['😟','😐','😊','😄','🤩'];

// ─── Utils ────────────────────────────────────────────────────────────────────
const fmt$ = v => {
  const n = parseFloat(v);
  if (isNaN(n) || v === '') return '—';
  return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n);
};
const calcNW = d => (parseFloat(d.savingsBalance)||0)+(parseFloat(d.investments)||0)-(parseFloat(d.debt)||0);
const calcNet = d => (parseFloat(d.income)||0)-(parseFloat(d.expenses)||0);

// ─── Micro-components ─────────────────────────────────────────────────────────
const Field = ({label,name,data,set,type='text',placeholder='',rows,mono}) => {
  const v = data[name]||'';
  const upd = e => set(p=>({...p,[name]:e.target.value}));
  const isNum = type==='number';
  return (
    <div className="fg">
      {label && <label>{label}</label>}
      {isNum ? (
        <div className="cw"><input type="number" value={v} onChange={upd} placeholder="0" /></div>
      ) : rows ? (
        <textarea rows={rows} value={v} onChange={upd} placeholder={placeholder} />
      ) : (
        <input type={type} value={v} onChange={upd} placeholder={placeholder}
          style={mono?{fontFamily:'monospace',fontSize:'22px',fontWeight:700,textAlign:'center',letterSpacing:'.03em'}:{}} />
      )}
    </div>
  );
};

const Prompt = ({items,cls='pcard-g',clr='var(--green)',children}) => (
  <div className={`pcard ${cls}`}>
    <div className="plabel" style={{color:clr}}>💬 Discussion Prompts</div>
    {items.map((t,i) => <div key={i} className="pi-item"><span style={{opacity:.5}}>›</span><span>{t}</span></div>)}
    {children}
  </div>
);

const MoodRow = ({label,name,data,set}) => (
  <div className="fg">
    <label>{label}</label>
    <div style={{display:'flex',gap:'6px'}}>
      {MOODS.map(m=>(
        <button key={m} className={`mood-btn ${data[name]===m?'sel':''}`} onClick={()=>set(p=>({...p,[name]:m}))} type="button">{m}</button>
      ))}
    </div>
  </div>
);

const LiveBadge = ({label,value,color='var(--green)',bg='var(--green-light)'}) => (
  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
    padding:'12px 16px',background:bg,borderRadius:'var(--r-sm)',marginBottom:'16px',
    border:`1px solid ${color}22`}}>
    <span style={{fontSize:'13px',fontWeight:600,color}}>{label}</span>
    <span style={{fontSize:'20px',fontWeight:700,color,fontFamily:"'Playfair Display',serif"}}>{value}</span>
  </div>
);

// ─── Step Components ──────────────────────────────────────────────────────────
const WarmupStep = ({data,set}) => (
  <div className="step-cols">
    <div>
      <Prompt cls="pcard-a" clr="var(--amber)" items={[
        "Start with a win — no matter how small. Skip a purchase? Hit a goal? Celebrate it!",
        "How did money make you feel this month? Stressed, calm, excited? No judgment.",
        "Is there anything one of you handled financially that deserves a compliment?",
      ]}>
        <div className="tip-box tip-a" style={{marginTop:'12px'}}>
          <div style={{fontSize:'12px',fontWeight:700,color:'var(--amber)',marginBottom:'4px'}}>⏱ TIMING TIP</div>
          <div style={{fontSize:'13px',color:'var(--text-muted)',lineHeight:1.5}}>Keep this to 5 min. Arrive energized, not overwhelmed. The rest of the agenda has space for details.</div>
        </div>
      </Prompt>
    </div>
    <div>
      <div className="fg">
        <label>Arthur's Win This Month 🏆</label>
        <textarea rows={3} value={data.arthurWin||''} onChange={e=>set(p=>({...p,arthurWin:e.target.value}))} placeholder="Something financial I'm proud of this month..." />
      </div>
      <div className="fg">
        <label>Lorena's Win This Month 🏆</label>
        <textarea rows={3} value={data.lorenaWin||''} onChange={e=>set(p=>({...p,lorenaWin:e.target.value}))} placeholder="Something financial I'm proud of this month..." />
      </div>
      <div className="g2">
        <MoodRow label="Arthur's money mood" name="arthurMoodS" data={data} set={set} />
        <MoodRow label="Lorena's money mood" name="lorenaMoodS" data={data} set={set} />
      </div>
    </div>
  </div>
);

const BudgetStep = ({data,set}) => {
  const net = calcNet(data);
  const inc = parseFloat(data.income)||0;
  const rate = inc>0 ? (net/inc*100).toFixed(1) : null;
  const hasNums = data.income||data.expenses;
  return (
    <div className="step-cols">
      <div>
        <Prompt items={[
          "Which category surprised you the most this month?",
          "Was there a purchase that felt truly worth it — and one that didn't?",
          "Any subscriptions or recurring bills we should audit?",
          "If we had to cut $200/month, where would it come from?",
        ]} />
        <div className="tip-box tip-g" style={{marginTop:'16px'}}>
          <div style={{fontSize:'12px',fontWeight:700,color:'var(--green)',marginBottom:'4px'}}>📐 HEALTHY SAVINGS RATE</div>
          <div style={{fontSize:'13px',color:'var(--text-muted)',lineHeight:1.5}}>Aim for 20%+ if you can. Even 10% consistently beats 30% occasionally. Progress &gt; perfection.</div>
        </div>
      </div>
      <div>
        <div className="g2">
          <Field label="Total Income" name="income" type="number" data={data} set={set} />
          <Field label="Total Expenses" name="expenses" type="number" data={data} set={set} />
        </div>
        {hasNums && (
          <LiveBadge
            label={net>=0?`Net Savings  •  ${rate}% savings rate`:'Overspent this month'}
            value={fmt$(net)}
            color={net>=0?'var(--green)':'var(--coral)'}
            bg={net>=0?'var(--green-light)':'var(--coral-light)'}
          />
        )}
        <Field label="What we did well 👍" name="budgetWell" rows={2} placeholder="e.g. Stayed under grocery budget, cooked at home more..." data={data} set={set} />
        <Field label="What to tweak next month" name="budgetAdjust" rows={2} placeholder="e.g. Dining out got away from us..." data={data} set={set} />
      </div>
    </div>
  );
};

const SavingsStep = ({data,set}) => {
  const nw = calcNW(data);
  const hasNums = data.savingsBalance||data.investments||data.debt;
  return (
    <div className="step-cols">
      <div>
        <Prompt items={[
          "Are we on track with our monthly savings goal?",
          "Any opportunities to invest more — a raise, bonus, or reduced expense?",
          "Are our investment allocations still aligned with our timeline and goals?",
          "Are we happy with where our savings are parked? HYSA, CD, brokerage?",
        ]} />
        <div className="tip-box tip-g" style={{marginTop:'14px'}}>
          <div style={{fontSize:'13px',color:'var(--text-muted)',lineHeight:1.5}}>💡 <strong style={{color:'var(--green)'}}>Net Worth</strong> = Savings + Investments − Debt. It's the number that actually tells the story.</div>
        </div>
      </div>
      <div>
        <Field label="Savings Account Balance" name="savingsBalance" type="number" data={data} set={set} />
        <Field label="Investments Balance (brokerage, etc.)" name="investments" type="number" data={data} set={set} />
        {hasNums && (
          <div className="nw-card" style={{marginBottom:'16px'}}>
            <div>
              <div style={{fontSize:'11px',opacity:.6,fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase'}}>Net Worth</div>
              <div style={{fontSize:'26px',fontWeight:700,fontFamily:"'Playfair Display',serif"}}>{fmt$(nw)}</div>
            </div>
            <div style={{fontSize:'36px',opacity:.25}}>💎</div>
          </div>
        )}
        <Field label="Notes / anything to change?" name="savingsNotes" rows={3} placeholder="e.g. Want to open a HYSA, increase auto-transfer..." data={data} set={set} />
      </div>
    </div>
  );
};

const DebtStep = ({data,set}) => (
  <div className="step-cols">
    <div>
      <Prompt cls="pcard-c" clr="var(--coral)" items={[
        "Did our total debt go down since last month? If yes — celebrate!",
        "Which is our highest-interest debt? That's our target.",
        "Can we throw any extra toward it this month?",
        "Any debt we could refinance, consolidate, or eliminate entirely?",
      ]}>
        <div className="tip-box tip-c" style={{marginTop:'12px'}}>
          <div style={{fontSize:'12px',fontWeight:700,color:'var(--coral)',marginBottom:'4px'}}>❄️ AVALANCHE METHOD</div>
          <div style={{fontSize:'13px',color:'var(--text-muted)',lineHeight:1.5}}>Pay minimums everywhere. Every extra dollar goes to the <em>highest-interest</em> debt first. Mathematically optimal.</div>
        </div>
      </Prompt>
    </div>
    <div>
      <Field label="Total Debt Balance" name="debt" type="number" data={data} set={set} />
      {data.debt && <LiveBadge label="Total Debt" value={fmt$(data.debt)} color="var(--coral)" bg="var(--coral-light)" />}
      <Field label="Our Current Debt Focus" name="debtFocus" placeholder="e.g. Visa @ 22% APR" data={data} set={set} />
      <Field label="Extra payments made this month?" name="debtExtra" rows={2} placeholder="e.g. Paid $400 extra on car loan..." data={data} set={set} />
      <Field label="Estimated payoff date for this debt" name="debtPayoff" placeholder="e.g. March 2027" data={data} set={set} />
    </div>
  </div>
);

const UpcomingStep = ({data,set}) => (
  <div className="step-cols">
    <div>
      <Prompt cls="pcard-a" clr="var(--amber)" items={[
        "Any big purchases in the next 1–3 months? Travel, car, home, gifts?",
        "Are we saving toward anything specific right now?",
        "Anything seasonal that could sneak up on us — back to school, holidays, annual fees?",
      ]} />
    </div>
    <div>
      {[1,2,3].map(i=>(
        <div key={i} className="g2">
          <Field label={`Upcoming Expense #${i}`} name={`upName${i}`} placeholder={['e.g. Car service','e.g. Vacation deposit','e.g. Annual insurance'][i-1]} data={data} set={set} />
          <Field label="Estimated Cost" name={`upAmt${i}`} type="number" data={data} set={set} />
        </div>
      ))}
      <Field label="Notes — are we saving for any of these?" name="upNotes" rows={2} placeholder="Any sinking funds or savings goals in place?" data={data} set={set} />
    </div>
  </div>
);

const RetirementStep = ({data,set}) => {
  const tot = (parseFloat(data.arthurRetirement)||0)+(parseFloat(data.lorenaRetirement)||0);
  return (
    <div className="step-cols">
      <div>
        <Prompt cls="pcard-p" clr="var(--purple)" items={[
          "Are we contributing enough to hit our retirement target? Room to increase by even 1%?",
          "How are our allocations — aggressive enough for our timeline?",
          "Any accounts to consolidate, roll over, or change?",
          "Any life change that affects our retirement picture?",
        ]}>
          <div className="tip-box tip-p" style={{marginTop:'12px'}}>
            <div style={{fontSize:'12px',fontWeight:700,color:'var(--purple)',marginBottom:'4px'}}>📐 RULE OF THUMB</div>
            <div style={{fontSize:'13px',color:'var(--text-muted)',lineHeight:1.5}}>Save at least 15% of gross income for retirement. Started late? Aim for 20%+. Time in market beats timing the market.</div>
          </div>

              {k:'quarterly', e:'📊', t:'Quarterly',   s:'~90 min',  d:'Monthly + Retirement Corner'},
              {k:'annual',    e:'⭐', t:'Q1 Annual',   s:'~2 hours', d:'Quarterly + Goals & Dreams', hl:true},
            ].map(m=>(
              <button key={m.k} onClick={()=>setMtype(m.k)}
                className={`mcard ${mtype===m.k?(m.hl?'sel-a':'sel'):''}`}
                style={m.hl&&mtype!==m.k?{borderColor:'var(--amber)'}:{}}>
                <div style={{fontSize:'26px',marginBottom:'8px'}}>{m.e}</div>
                <div className="serif" style={{fontSize:'16px',fontWeight:600,marginBottom:'2px',color:m.hl?'var(--amber)':'var(--text)'}}>{m.t}</div>
                <div style={{fontSize:'12px',fontWeight:700,color:m.hl?'var(--amber)':'var(--green)',marginBottom:'6px'}}>{m.s}</div>
                <div style={{fontSize:'12px',color:'var(--text-muted)',lineHeight:1.4}}>{m.d}</div>
                {m.hl && <div style={{marginTop:'8px',fontSize:'11px',fontWeight:700,color:'var(--amber)',letterSpacing:'.04em'}}>← This Friday!</div>}
              </button>
            ))}
          </div>
        </div>

        {/* ── Pre-meeting: Check spending first ── */}
        <div className="au3" style={{marginBottom:'28px'}}>
          <div style={{background:'linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%)',
            borderRadius:'var(--r)',padding:'20px 24px',
            display:'flex',alignItems:'center',gap:'14px'}}>
            <div style={{fontSize:'32px',flexShrink:0}}>🤖</div>
            <div>
              <div style={{fontWeight:700,color:'#fff',fontSize:'15px',marginBottom:'3px'}}>
                Before you start — check your spending
              </div>
              <div style={{fontSize:'13px',color:'rgba(255,255,255,.55)',lineHeight:1.45}}>
                Open Copilot and ask <em style={{color:'rgba(255,255,255,.75)'}}>"How did we spend this month?"</em> so you arrive with the numbers ready.
              </div>
            </div>
          </div>
        </div>

        <div className="au4" style={{display:'flex',justifyContent:'center'}}>
          <button className="btn-p" onClick={start} disabled={!mtype}
            style={{fontSize:'16px',padding:'15px 44px',boxShadow:'0 6px 24px rgba(10,92,72,.28)'}}>
            Start Money Date →
          </button>
        </div>
      </div>
    </div>
  );

  // ── STEPS ───────────────────────────────────────────────────────────────────
  if (!meta) return null;
  const isSummary = step==='summary';

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      {/* Sticky top bar */}
      <div style={{background:'#fff',borderBottom:'1px solid var(--border)',padding:'10px 24px',
        display:'flex',alignItems:'center',gap:'16px',position:'sticky',top:0,zIndex:20,boxShadow:'0 1px 0 var(--border)'}}>
        <button onClick={()=>setScreen('welcome')} style={{background:'none',border:'none',fontSize:'20px',color:'var(--text-muted)',padding:'2px 6px',lineHeight:1}}>←</button>
        <div style={{flex:1}}>
          <div className="pbar-t" style={{marginBottom:'5px'}}>
            <div className="pbar-f" style={{width:`${prog}%`}} />
          </div>
          <div className="dot-track">
            {steps.map((s,i)=>(
              <div key={s} className="dot"
                style={{width:i===si?20:6, background:i<=si?'var(--green)':'var(--border)'}} />
            ))}
          </div>
        </div>
        <div className="timer" style={{fontSize:'13px',color:'var(--text-muted)',fontWeight:500,fontVariantNumeric:'tabular-nums'}}>
          ⏱ {fmtT(elapsed)}
        </div>
      </div>

      {/* Step header */}
      <div className={meta.hdr} style={{padding:'22px 40px 18px',color:'#fff'}}>
        <div style={{maxWidth:'960px',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:'11px',fontWeight:700,letterSpacing:'.1em',opacity:.5,textTransform:'uppercase',marginBottom:'5px'}}>
              Step {si+1} of {steps.length}
            </div>
            <h2 className="serif" style={{fontSize:'clamp(18px,3vw,28px)',fontWeight:700,display:'flex',alignItems:'center',gap:'10px'}}>
              <span>{meta.emoji}</span> {meta.title}
            </h2>
          </div>
          {meta.time && (
            <div style={{textAlign:'right',opacity:.6}}>
              <div style={{fontSize:'10px',letterSpacing:'.06em',textTransform:'uppercase'}}>Suggested</div>
              <div style={{fontSize:'14px',fontWeight:600}}>{meta.time}</div>
            </div>
          )}
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,padding:'32px 40px',maxWidth:'980px',margin:'0 auto',width:'100%'}}>
        <div key={animKey} className="ai">
          {isSummary ? (
            <SummaryStep data={data} meetingType={mtype} onReset={reset} />
          ) : StepComp ? (
            <StepComp data={data} set={setData} />
          ) : null}
        </div>
      </div>

      {/* Bottom nav */}
      {!isSummary && (
        <div style={{background:'#fff',borderTop:'1px solid var(--border)',padding:'14px 40px',
          display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',bottom:0}}>
          <button className="btn-s" onClick={()=>go(-1)} disabled={si===0} style={{opacity:si===0?.3:1}}>
            ← Back
          </button>
          <span style={{fontSize:'13px',color:'var(--text-muted)',fontWeight:500}}>{si+1} / {steps.length}</span>
          <button className="btn-p" onClick={()=>go(1)}>
            {si===steps.length-2 ? '🎉 Finish →' : 'Next →'}
          </button>
        </div>
      )}
    </div>
  );
}

// Fix forward references
const warmup = WarmupStep;
STEP_MAP.warmup = WarmupStep;

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
